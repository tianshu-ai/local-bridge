name: Release

# Two-step release flow (mirrors tianshu):
#
#   1. release-please runs on every push to main. It reads conventional
#      commits and either opens/updates a release PR (no publish), or —
#      when that PR is merged — cuts the tag + GitHub Release and sets
#      release_created=true.
#
#   2. publish-npm runs only when release_created=true: checks out the
#      tagged commit, builds, and publishes to npm with provenance.
#
# Requires repo secret NPM_TOKEN (an npm automation token with publish
# rights to the @tianshu-ai scope).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance attestations
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Inspect the would-be tarball
        run: |
          npm pack --dry-run 2>&1 | tail -40
          echo "---"
          node -e "const p = require('./package.json'); console.log('name=' + p.name, 'version=' + p.version, 'access=' + (p.publishConfig && p.publishConfig.access));"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## :rocket: Published \`@tianshu-ai/local-bridge@${{ needs.release-please.outputs.version }}\` to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Registry: https://www.npmjs.com/package/@tianshu-ai/local-bridge/v/${{ needs.release-please.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ needs.release-please.outputs.tag_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run: \`npx @tianshu-ai/local-bridge@${{ needs.release-please.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
